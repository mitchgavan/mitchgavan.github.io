<!DOCTYPE html>
<html lang="en">
  {% include head.html %}

  <body class="homepage">
    {% include webpack.html %}

    <main class="home" id="main" role="main">
      <aside class="homeRail" aria-label="Primary">
        <div class="homeRail__inner">
          <div class="homeRail__brand" aria-hidden="true">
            {% include svg/logo.html %}
          </div>

          <div class="homeRail__content">
            <nav class="homeRail__nav" aria-label="Homepage">
              <a href="{{ site.baseurl }}/about/" class="homeRail__link">About</a>
              <a href="{{ site.baseurl }}/blog/" class="homeRail__link">Blog</a>
              <a href="{{ site.baseurl }}/work/" class="homeRail__link">Work</a>
            </nav>
            <div class="homeRail__theme">
              {% include theme-toggle.html class="themeToggle--rail" %}
            </div>
          </div>

          <div class="homeRail__meta">
            <p>&copy; {{ "now" | date: "%Y" }} {{ site.name }}</p>
            <p>Melbourne, Australia</p>
          </div>
        </div>
      </aside>

      <section class="homePanel">
        <div class="homePanel__inner">
          {{ content }}
        </div>
      </section>
    </main>

    {% include analytics.html %}
  </body>
</html>
