---
layout: homepage
home: Senior Frontend Engineer
---

<section class="homeIntro">
  <div class="homeIntro__avatarWrap">
    <img
      src="{{ site.baseurl }}{{ site.avatar }}"
      alt="Portrait of {{ site.name }}"
      class="homeIntro__avatar"
      width="180"
      height="180"
    />
  </div>

  <div class="homeIntro__content">
    <h1 class="homeIntro__title">{{ site.name }}</h1>
    <p class="homeIntro__lede">
      Senior software engineer focused on design systems and frontend platforms
      that scale across products, teams, and codebases.
    </p>

    <ul class="homeIntro__contacts" aria-label="Contact links">
      <li>
        <a href="mailto:{{ site.footer-links.email }}">Email</a>
      </li>
      <li>
        <a
          href="https://github.com/{{ site.footer-links.github }}"
          target="_blank"
          rel="noreferrer noopener"
        >
          GitHub
        </a>
      </li>
      <li>
        <a
          href="https://www.linkedin.com/in/mitch-gavan/"
          target="_blank"
          rel="noreferrer noopener"
        >
          LinkedIn
        </a>
      </li>
    </ul>
  </div>
</section>
